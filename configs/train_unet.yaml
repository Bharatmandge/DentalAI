# --- configs/train_unet.yaml ---
experiment_name: "binary_teeth_segmentation_v1"
seed: 42
device: "cuda" # Use "cpu" if you do not have a GPU, or "mps" for Apple Silicon

data:
  train_dir: "./data/raw/train"
  val_dir: "./data/raw/val"
  batch_size: 2
  spatial_size: [96, 96, 96]
  num_workers: 4

model:
  name: "monai_unet"
  in_channels: 1
  out_channels: 1
  features: [16, 32, 64, 128, 256]
  dropout: 0.2

training:
  epochs: 100
  learning_rate: 0.0001
  weight_decay: 0.00001
  patience: 15
  save_dir: "./models/weights"
  log_dir: "./logs"